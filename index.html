<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbology Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117; color: #e8eaed; line-height: 1.6;
        }
        .loading-screen {
            position: fixed; inset: 0; background: #0f1117;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity .5s;
        }
        .loading-screen.hidden { opacity: 0; pointer-events: none; }
        .file-drop-zone {
            border: 2px dashed #e30613; border-radius: 16px; padding: 40px 30px;
            text-align: center; cursor: pointer; transition: all .3s;
            max-width: 420px; margin: 20px auto 0;
        }
        .file-drop-zone:hover, .file-drop-zone.dragover { background: rgba(227,6,19,.1); border-color: #ff4444; }
        .file-drop-zone input[type="file"] { display: none; }
        .file-drop-title { font-size: 1.1rem; color: #e0e0e0; margin-bottom: 8px; }
        .file-drop-sub { font-size: .85rem; color: #888; }
        .loading-spinner {
            width: 40px; height: 40px; border: 3px solid #2a2e3f;
            border-top-color: #e30613; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { margin-top: 1rem; color: #8b8fa3; font-size: .9rem; }
        .error-msg { color: #e30613; text-align: center; padding: 3rem; font-size: 1.1rem; }

        .navbar {
            position: sticky; top: 0; z-index: 100;
            background: #1a1d27; border-bottom: 1px solid #2a2e3f;
            padding: 1rem 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .navbar-title { font-size: 1.25rem; font-weight: 600; display: flex; align-items: center; gap: .5rem; }
        .navbar-stats { font-size: .875rem; color: #8b8fa3; }

        .filter-bar {
            position: sticky; top: 60px; z-index: 99;
            background: #1a1d27; border-bottom: 1px solid #2a2e3f;
            padding: 1rem 1.5rem;
            display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;
        }
        .filter-group { display: flex; flex-direction: column; gap: .4rem; }
        .filter-group label {
            font-size: .7rem; font-weight: 600; color: #8b8fa3;
            text-transform: uppercase; letter-spacing: .5px;
        }
        .filter-group select {
            background: #2a2e3f; border: 1px solid #2a2e3f; color: #e8eaed;
            padding: .5rem .75rem; border-radius: 4px; font-size: .875rem; cursor: pointer;
            min-width: 200px;
        }
        .filter-group select:hover { border-color: #e30613; }
        .filter-group select:focus { outline: none; border-color: #e30613; }
        .view-tabs { display: flex; gap: .25rem; }
        .view-tab {
            padding: .5rem 1rem; border-radius: 4px; cursor: pointer;
            font-size: .875rem; font-weight: 500; border: 1px solid #2a2e3f;
            background: transparent; color: #8b8fa3; transition: all .2s;
        }
        .view-tab:hover { border-color: #e30613; color: #e8eaed; }
        .view-tab.active { background: #e30613; color: white; border-color: #e30613; }
        .country-chips { display: flex; gap: .35rem; flex-wrap: wrap; align-items: center; }
        .country-chip {
            padding: .35rem .65rem; border-radius: 20px; cursor: pointer;
            font-size: .8rem; font-weight: 500; border: 1px solid #2a2e3f;
            background: transparent; color: #8b8fa3; transition: all .2s; white-space: nowrap;
        }
        .country-chip:hover { border-color: #e30613; color: #e8eaed; }
        .country-chip.active { background: #e30613; color: white; border-color: #e30613; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
        .view-content { display: none; }
        .view-content.active { display: block; }
        .league-section { display: none; }
        .league-section.active { display: block; }
        .league-header { display: flex; justify-content: space-between; align-items: center; margin: 2rem 0 1rem; }
        .league-title { font-size: 1.5rem; font-weight: 700; }
        .league-badge { background: #e30613; color: white; padding: .25rem .75rem; border-radius: 4px; font-size: .875rem; font-weight: 600; }
        .table-wrapper { background: #1a1d27; border: 1px solid #2a2e3f; border-radius: 8px; overflow: hidden; margin-bottom: 2rem; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #222530; padding: .6rem 1rem; text-align: left; font-weight: 600; font-size: .7rem; text-transform: uppercase; letter-spacing: .5px; color: #8b8fa3; border-bottom: 1px solid #2a2e3f; }
        td { padding: .6rem 1rem; border-bottom: 1px solid #1f2233; }
        tbody tr { transition: background .15s ease; }
        tbody tr:nth-child(odd) { background: #1a1d27; }
        tbody tr:nth-child(even) { background: #151820; }
        tbody tr:hover { background: #222530; }
        tbody tr.unvisited { opacity: .2; }
        .rank-cell { font-weight: 700; color: #e30613; width: 40px; text-align: center; }
        .rank-cell.top3 { color: #fbbf24; }
        .logo-cell { width: 40px; text-align: center; }
        .logo-cell img { width: 32px; height: 32px; object-fit: contain; vertical-align: middle; }
        .initials-badge { width: 32px; height: 32px; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: .7rem; color: white; }
        .team-name-cell { font-weight: 500; }
        .matches-cell { text-align: center; font-weight: 700; width: 60px; }
        .matches-cell.has-visits { color: #e30613; }
        .date-cell { font-size: .8rem; color: #8b8fa3; white-space: nowrap; width: 90px; }
        .section-subtitle { font-size: .85rem; font-weight: 600; margin: 2rem 0 1rem; color: #8b8fa3; text-transform: uppercase; letter-spacing: .5px; }
        .stadium-icon { font-size: 1.2rem; width: 32px; text-align: center; }
        .stadium-city-cell { color: #8b8fa3; font-size: .85rem; }
        .badges-row { display: flex; gap: .6rem; flex-wrap: wrap; justify-content: center; margin-bottom: 1.5rem; }
        .badge { background: #1a1d27; border: 1px solid #2a2e3f; border-radius: 10px; padding: .6rem .9rem; display: flex; align-items: center; gap: .6rem; min-width: 140px; transition: border-color .2s; }
        .badge:hover { border-color: #e30613; }
        .badge.clickable { cursor: pointer; }
        .badge-icon { font-size: 1.3rem; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: rgba(227,6,19,.1); border-radius: 8px; flex-shrink: 0; }
        .badge-info { display: flex; flex-direction: column; }
        .badge-value { font-size: 1.1rem; font-weight: 800; color: #e8eaed; line-height: 1.2; }
        .badge-label { font-size: .6rem; color: #8b8fa3; text-transform: uppercase; letter-spacing: .5px; line-height: 1.2; }
        .badge-sub { font-size: .55rem; color: #555; line-height: 1.3; max-width: 130px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .badge-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 1000; justify-content: center; align-items: center; }
        .badge-modal-overlay.active { display: flex; }
        .badge-modal { background: #1a1d27; border: 1px solid #2a2e3f; border-radius: 12px; padding: 1.5rem; max-width: 500px; width: 90%; max-height: 70vh; overflow-y: auto; position: relative; }
        .badge-modal h3 { font-size: 1.1rem; margin-bottom: 1rem; display: flex; align-items: center; gap: .5rem; }
        .badge-modal .close-btn { position: absolute; top: .75rem; right: .75rem; background: none; border: none; color: #8b8fa3; font-size: 1.3rem; cursor: pointer; }
        .badge-modal .close-btn:hover { color: #e30613; }
        .badge-modal-list { list-style: none; padding: 0; margin: 0; }
        .badge-modal-list li { padding: .4rem 0; border-bottom: 1px solid #2a2e3f; font-size: .85rem; display: flex; justify-content: space-between; }
        .badge-modal-list li:last-child { border-bottom: none; }
        .badge-modal-list .bm-name { font-weight: 500; }
        .badge-modal-list .bm-value { color: #e30613; font-weight: 700; }
        .pinnwand { max-width: 1000px; margin: 2rem auto; position: relative; background: #96722e; background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='80' height='80' filter='url(%23n)' opacity='.15'/%3E%3C/svg%3E"), linear-gradient(160deg, #a07828 0%, #8B6914 30%, #7a5c12 60%, #8B6914 100%); border-radius: 6px; padding: 2rem 2rem 1.75rem; border: 8px solid #4a3508; box-shadow: inset 0 2px 12px rgba(0,0,0,.35), 0 6px 30px rgba(0,0,0,.5), 0 1px 0 #b8922e; }
        .pinnwand::before { content: ''; position: absolute; inset: -8px; border-radius: 6px; border: 2px solid rgba(255,255,255,.08); pointer-events: none; }
        .pinnwand-header { text-align: center; margin-bottom: 1.25rem; }
        .pinnwand-number { font-size: 2.2rem; font-weight: 900; color: rgba(255,255,255,.1); line-height: 1; }
        .pinnwand-label { font-size: .65rem; color: rgba(255,255,255,.3); text-transform: uppercase; letter-spacing: 2px; }
        .pinnwand-patches { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; padding: 0; }
        .patch { width: 60px; height: 60px; border-radius: 4px; display: flex; align-items: center; justify-content: center; transition: all .2s; cursor: default; position: relative; background: rgba(255,255,255,.07); box-shadow: 0 1px 3px rgba(0,0,0,.25); }
        .patch::before { content: ''; position: absolute; top: -4px; left: 50%; transform: translateX(-50%); width: 10px; height: 10px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #f44, #c22 60%, #911); box-shadow: 0 1px 3px rgba(0,0,0,.5); z-index: 3; }
        .patch:nth-child(3n+1)::before { background: radial-gradient(circle at 35% 35%, #4bf, #28c 60%, #169); }
        .patch:nth-child(3n+2)::before { background: radial-gradient(circle at 35% 35%, #fd4, #da2 60%, #a80); }
        .patch:hover { transform: scale(1.35) rotate(-2deg); z-index: 2; background: rgba(255,255,255,.18); box-shadow: 0 6px 20px rgba(0,0,0,.4); }
        .patch img { width: 48px; height: 48px; object-fit: contain; filter: drop-shadow(0 1px 2px rgba(0,0,0,.3)); }
        .patch .patch-initials { width: 48px; height: 48px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .7rem; color: white; }
        .patch .patch-count { font-size: .55rem; color: white; font-weight: 700; background: #e30613; border-radius: 6px; padding: 1px 4px; position: absolute; bottom: -5px; right: -5px; line-height: 1.4; z-index: 3; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
        .patch-tooltip { position: absolute; bottom: calc(100% + 10px); left: 50%; transform: translateX(-50%); background: rgba(0,0,0,.9); color: white; padding: .35rem .6rem; border-radius: 6px; font-size: .7rem; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity .2s; z-index: 10; }
        .patch-tooltip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 5px solid transparent; border-top-color: rgba(0,0,0,.9); }
        .patch:hover .patch-tooltip { opacity: 1; }
        .flags-row { margin-bottom: 1.25rem; }
        .flags-row-title { font-size: .75rem; font-weight: 600; color: #8b8fa3; text-transform: uppercase; letter-spacing: .5px; margin-bottom: .75rem; }
        .flags-scroll { display: flex; gap: .75rem; flex-wrap: wrap; }
        .flag-card { flex: 0 0 auto; width: 130px; background: #1a1d27; border: 1px solid #2a2e3f; border-radius: 10px; padding: .85rem .75rem; text-align: center; transition: all .25s; cursor: pointer; position: relative; }
        .flag-card:hover { border-color: #4ecdc4; background: #1e2130; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(78, 205, 196, .12); }
        .flag-card.active { border-color: #4ecdc4; background: #1a2a2e; box-shadow: 0 0 12px rgba(78, 205, 196, .2); }
        .flag-emoji { font-size: 2.5rem; line-height: 1; margin-bottom: .4rem; }
        .flag-label { font-size: .7rem; font-weight: 600; color: #e8eaed; }
        .flag-count { font-size: .65rem; color: #4ecdc4; font-weight: 700; }
        .flag-progress { margin-top: .4rem; width: 100%; }
        .flag-progress-bar { height: 4px; background: #2a2e3f; border-radius: 2px; overflow: hidden; margin-bottom: .15rem; }
        .flag-progress-fill { height: 100%; background: #4ecdc4; border-radius: 2px; transition: width .5s; }
        .flag-progress-text { font-size: .55rem; color: #8b8fa3; }
        .trophy-shelf { margin-bottom: 2rem; padding: 1.25rem 0; }
        .trophy-shelf-title { font-size: .75rem; font-weight: 600; color: #8b8fa3; text-transform: uppercase; letter-spacing: .5px; margin-bottom: .75rem; }
        .trophy-scroll { display: flex; gap: .75rem; overflow-x: auto; padding-bottom: .5rem; scrollbar-width: thin; scrollbar-color: #2a2e3f transparent; }
        .trophy-scroll::-webkit-scrollbar { height: 4px; }
        .trophy-scroll::-webkit-scrollbar-track { background: transparent; }
        .trophy-scroll::-webkit-scrollbar-thumb { background: #2a2e3f; border-radius: 2px; }
        .trophy-card { flex: 0 0 auto; width: 110px; background: #1a1d27; border: 1px solid #2a2e3f; border-radius: 10px; padding: .75rem .5rem; text-align: center; transition: all .25s; cursor: pointer; position: relative; }
        .trophy-card:hover { border-color: #c9a84c; background: #1e2130; transform: translateY(-3px); box-shadow: 0 6px 20px rgba(201, 168, 76, .15); }
        .trophy-card.active { border-color: #c9a84c; background: #252130; box-shadow: 0 0 12px rgba(201, 168, 76, .25); }
        .trophy-img-wrap { width: 64px; height: 64px; margin: 0 auto .5rem; display: flex; align-items: center; justify-content: center; position: relative; }
        .trophy-img-wrap img { max-width: 60px; max-height: 60px; object-fit: contain; filter: drop-shadow(0 2px 8px rgba(201, 168, 76, .3)); }
        .trophy-img-wrap .trophy-fallback { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; font-size: 2rem; filter: grayscale(0.2); }
        .trophy-name { font-size: .65rem; font-weight: 600; color: #e8eaed; line-height: 1.2; margin-bottom: .25rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .trophy-count { font-size: .7rem; font-weight: 700; color: #c9a84c; }
        .trophy-years { font-size: .55rem; color: #555; margin-top: .15rem; }
        .liveticker-section { margin-top: 3rem; border-top: 1px solid #2a2e3f; padding-top: 2rem; }
        .liveticker-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 1rem; display: flex; align-items: center; gap: .5rem; }
        .liveticker-title .pulse { width: 8px; height: 8px; background: #e30613; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
        .ticker-list { display: flex; flex-direction: column; gap: .5rem; }
        .ticker-item { background: #1a1d27; border: 1px solid #2a2e3f; border-radius: 8px; padding: .75rem 1rem; display: flex; align-items: center; gap: 1rem; transition: border-color .2s; }
        .ticker-item:hover { border-color: #e30613; }
        .ticker-hidden { display: none; }
        .ticker-date { font-size: .75rem; color: #8b8fa3; min-width: 75px; font-weight: 600; }
        .ticker-teams { flex: 1; font-weight: 500; display: flex; align-items: center; gap: .5rem; }
        .ticker-score { background: #e30613; color: white; padding: .15rem .5rem; border-radius: 4px; font-weight: 700; font-size: .85rem; min-width: 40px; text-align: center; }
        .ticker-comp { font-size: .75rem; color: #8b8fa3; min-width: 100px; text-align: right; }
        .ticker-stadium { font-size: .7rem; color: #555; min-width: 120px; text-align: right; }
        .ticker-city { font-size: .7rem; color: #555; min-width: 80px; text-align: right; }
        .stats-section { margin-top: 1.5rem; margin-bottom: 1.5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .stat-card { background: #1a1d27; border: 1px solid #2a2e3f; border-radius: 10px; padding: 1.25rem; }
        .stat-card-title { font-size: .7rem; font-weight: 600; color: #8b8fa3; text-transform: uppercase; letter-spacing: .5px; margin-bottom: .75rem; }
        .stat-bar-row { display: flex; align-items: center; gap: .5rem; margin-bottom: .5rem; }
        .stat-bar-label { font-size: .8rem; min-width: 90px; }
        .stat-bar { flex: 1; height: 20px; background: #2a2e3f; border-radius: 4px; overflow: hidden; position: relative; }
        .stat-bar-fill { height: 100%; border-radius: 4px; transition: width .5s; }
        .stat-bar-value { font-size: .75rem; font-weight: 700; min-width: 35px; text-align: right; }
        .milestones-section { margin-top: 1.5rem; margin-bottom: 1.5rem; }
        .milestones-title { font-size: .75rem; font-weight: 600; color: #8b8fa3; text-transform: uppercase; letter-spacing: .5px; margin-bottom: .75rem; }
        .milestones-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: .75rem; }
        .milestone-card { background: #1a1d27; border: 1px solid #2a2e3f; border-radius: 10px; padding: .85rem 1rem; display: flex; gap: .75rem; align-items: flex-start; transition: border-color .2s; }
        .milestone-card:hover { border-color: #c9a84c; }
        .milestone-icon { font-size: 1.4rem; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: rgba(201,168,76,.1); border-radius: 8px; flex-shrink: 0; }
        .milestone-info { display: flex; flex-direction: column; }
        .milestone-label { font-size: .65rem; color: #8b8fa3; text-transform: uppercase; letter-spacing: .5px; }
        .milestone-value { font-size: .85rem; font-weight: 600; }
        .milestone-detail { font-size: .7rem; color: #8b8fa3; }
        .timeline-section { margin-top: 1.5rem; margin-bottom: 1.5rem; }
        .timeline-title { font-size: .75rem; font-weight: 600; color: #8b8fa3; text-transform: uppercase; letter-spacing: .5px; margin-bottom: .75rem; }
        .timeline-chart { display: flex; align-items: flex-end; gap: 3px; height: 120px; padding: .5rem 0; }
        .timeline-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
        .timeline-bar { width: 100%; min-width: 16px; max-width: 40px; background: linear-gradient(180deg, #e30613, #8b1a1a); border-radius: 3px 3px 0 0; transition: all .3s; cursor: default; position: relative; }

        .timeline-bar-count { font-size: .6rem; font-weight: 700; text-align: center; margin-bottom: 2px; color: #e8eaed; }
        .timeline-bar-year { font-size: .55rem; color: #8b8fa3; text-align: center; margin-top: 4px; writing-mode: vertical-lr; transform: rotate(180deg); height: 28px; }

    // === CSV PARSER (handles both formats) ===
    function parseCSV(text) {
        // Remove BOM, normalize line endings, trim
        const clean = text.replace(/^\uFEFF/, '').replace(/\r\n/g, '\n').replace(/\r/g, '\n').trim();
        const lines = clean.split('\n').filter(l => l.trim());
        if (!lines.length) return [];

        // Detect format: semicolon CSV (with header) vs Futbology export (colon-separated, no header)
        const firstLine = lines[0];
        const isSemicolonCSV = firstLine.includes(';') && firstLine.toLowerCase().includes('date');

        if (isSemicolonCSV) {
            // Format: date;homeTeam;awayTeam;score;stadium;competition
            const headers = firstLine.split(';').map(h => h.trim().toLowerCase());
            return lines.slice(1).filter(l => l.trim()).map(line => {
                const vals = line.split(';');
                const obj = {};
                headers.forEach((h, i) => obj[h] = (vals[i] || '').trim());
                return {
                    date: obj['date'] || '',
                    homeTeam: obj['hometeam'] || '',
                    awayTeam: obj['awayteam'] || '',
                    score: obj['score'] || '',
                    stadium: obj['stadium'] || '',
                    competition: obj['competition'] || ''
                };
            });
        } else {
            // Futbology export format: date:stadium:home:away:hGoals:aGoals::competition
            return lines.map(line => {
                const compParts = line.split('::');
                const competition = compParts.length > 1 ? compParts[1].trim() : '';
                const fields = compParts[0].split(':');
                if (fields.length < 6) return null;
                return {
                    date: fields[0].trim(),
                    stadium: fields[1].trim(),
                    homeTeam: fields[2].trim(),
                    awayTeam: fields[3].trim(),
                    score: fields[4].trim() + ':' + fields[5].trim(),
                    competition: competition
                };
            }).filter(m => m && m.date);
        }
    }

        let sum = 0; for (let c of name) sum += c.charCodeAt(0);
        return colors[sum % colors.length];

    let matches = [], stadiums = [];
    let activeCountry = null, activeTrophy = null;
    let mapInitialized = false;
    let computedData = {};

    // === THEME ===
    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        try { localStorage.setItem('futbology-theme', document.body.classList.contains('light-mode') ? 'light' : 'dark'); } catch(e) {}
    }
    try { if (localStorage.getItem('futbology-theme') === 'light') document.body.classList.add('light-mode'); } catch(e) {}

    // === DATA PROCESSING ===
    function processData() {
        const d = {};
        // Team visits
        d.teamVisits = {};
        d.allTeamsSeen = new Set();
        matches.forEach(m => {
            d.allTeamsSeen.add(m.homeTeam);
            d.allTeamsSeen.add(m.awayTeam);
            d.teamVisits[m.homeTeam] = (d.teamVisits[m.homeTeam] || 0) + 1;
            d.teamVisits[m.awayTeam] = (d.teamVisits[m.awayTeam] || 0) + 1;
        });

        // Stadium data maps
        d.stadiumCountry = {};
        d.stadiumCity = {};
        stadiums.forEach(s => {
            d.stadiumCountry[s.name] = s.country;
            d.stadiumCity[s.name] = s.city || '';
        });
        // Fill city from team_stadiums
        Object.entries(TEAM_STADIUMS).forEach(([team, [sname, city]]) => {
            if (!d.stadiumCity[sname]) d.stadiumCity[sname] = city;
        });

        // Badge stats
        d.statMatches = matches.length;
        d.statTeams = d.allTeamsSeen.size;
        d.statStadiums = stadiums.filter(s => s.visits > 0).length;
        d.visitedCountries = [...new Set(stadiums.filter(s => s.visits > 0).map(s => s.country))];
        d.statCountries = d.visitedCountries.length;

        // Score analysis
        d.totalGoals = 0; d.homeWins = 0; d.awayWins = 0; d.draws = 0; d.scoredMatches = 0;
        d.bestWin = null; d.bestDiff = 0; d.mostGoals = 0; d.mostGoalsMatch = null;
        matches.forEach(m => {
            if (m.score && m.score.includes(':')) {
                const [h, a] = m.score.split(':').map(Number);
                if (!isNaN(h) && !isNaN(a)) {
                    d.totalGoals += h + a; d.scoredMatches++;
                    if (h > a) d.homeWins++; else if (a > h) d.awayWins++; else d.draws++;
                    const diff = Math.abs(h - a), total = h + a;
                    if (diff > d.bestDiff) { d.bestDiff = diff; d.bestWin = m; }
                    if (total > d.mostGoals) { d.mostGoals = total; d.mostGoalsMatch = m; }
                }
            }
        });
        d.goalsPerMatch = d.scoredMatches ? (d.totalGoals / d.scoredMatches).toFixed(1) : '0';

        // Trophy data
        d.trophyMatches = {};
        matches.forEach(m => {
            const group = getTrophyGroup(m.competition);
            if (!group) return;
            if (!d.trophyMatches[group]) d.trophyMatches[group] = {count:0, first:m.date, last:m.date};
            d.trophyMatches[group].count++;
            if (m.date < d.trophyMatches[group].first) d.trophyMatches[group].first = m.date;
            if (m.date > d.trophyMatches[group].last) d.trophyMatches[group].last = m.date;
        });

        // First visit dates
        d.teamFirstDate = {}; d.stadiumFirstDate = {};
        const sorted = [...matches].sort((a,b) => (a.date||'').localeCompare(b.date||''));
        sorted.forEach(m => {
            [m.homeTeam, m.awayTeam].forEach(t => {
                if (!d.teamFirstDate[t] || m.date < d.teamFirstDate[t]) d.teamFirstDate[t] = m.date;
            });
            if (!d.stadiumFirstDate[m.stadium] || m.date < d.stadiumFirstDate[m.stadium])
                d.stadiumFirstDate[m.stadium] = m.date;
        });

        // Timeline
        d.yearCounts = {};
        matches.forEach(m => { const y = m.date.slice(0,4); d.yearCounts[y] = (d.yearCounts[y]||0)+1; });
        d.allYears = Object.keys(d.yearCounts).sort();

        // Milestones
        d.milestones = [];
        if (sorted.length) {
            const first = sorted[0];
            d.milestones.push(['Erstes Spiel', formatDate(first.date), first.homeTeam+' '+first.score+' '+first.awayTeam, first.stadium, '🎬']);
            for (const m of sorted) {
                const c = d.stadiumCountry[m.stadium];
                if (c && c !== 'Deutschland') {
                    d.milestones.push(['Erstes Auslandsspiel', formatDate(m.date), m.homeTeam+' '+m.score+' '+m.awayTeam, m.stadium+' ('+c+')', '✈️']);
                    break;
                }
            }
            for (const m of sorted) {
                if (m.competition.includes('Champions League')) {
                    d.milestones.push(['Erstes CL-Spiel', formatDate(m.date), m.homeTeam+' '+m.score+' '+m.awayTeam, m.stadium, '⭐']);
                    break;
                }
            }
            for (const m of sorted) {
                if (m.competition.includes('WM')) {
                    d.milestones.push(['Erstes WM-Spiel', formatDate(m.date), m.homeTeam+' '+m.score+' '+m.awayTeam, m.stadium, '🌍']);
                    break;
                }
            }
            if (sorted.length >= 50) { const m = sorted[49]; d.milestones.push(['50. Spiel', formatDate(m.date), m.homeTeam+' '+m.score+' '+m.awayTeam, m.stadium, '🎯']); }
            if (sorted.length >= 100) { const m = sorted[99]; d.milestones.push(['100. Spiel', formatDate(m.date), m.homeTeam+' '+m.score+' '+m.awayTeam, m.stadium, '💯']); }
            const last = sorted[sorted.length-1];
            d.milestones.push(['Letztes Spiel', formatDate(last.date), last.homeTeam+' '+last.score+' '+last.awayTeam, last.stadium, '🏁']);
        }

        // Country stats
        d.countryStats = {};
        stadiums.forEach(s => {
            if (!d.countryStats[s.country]) d.countryStats[s.country] = {stadiums:0, visits:0, visited:0};
            d.countryStats[s.country].stadiums++;
            d.countryStats[s.country].visits += s.visits;
            if (s.visits > 0) d.countryStats[s.country].visited++;
        });

        // League data
        d.leagueData = {};
        // Build from all teams seen + roster
        const allLeagues = new Set();
        d.allTeamsSeen.forEach(t => { const lg = TEAM_TO_LEAGUE[t]; if (lg) allLeagues.add(lg); });

        allLeagues.forEach(lg => {
            const roster = FULL_LEAGUE_ROSTERS[lg] || [];
            const teamsInLeague = new Set(roster);
            d.allTeamsSeen.forEach(t => { if (TEAM_TO_LEAGUE[t] === lg) teamsInLeague.add(t); });

            const teams = [...teamsInLeague].map(t => [t, d.teamVisits[t] || 0]);
            teams.sort((a,b) => b[1] - a[1] || a[0].localeCompare(b[0]));

            // Stadiums for this league
            const stadiumSet = new Set();
            teams.forEach(([t]) => {
                const s = TEAM_STADIUMS[t];
                if (s) stadiumSet.add(JSON.stringify({name: s[0], city: s[1]}));
            });
            const leagueStadiums = [...stadiumSet].map(s => {
                const obj = JSON.parse(s);
                const found = stadiums.find(st => st.name === obj.name);
                return { name: obj.name, city: obj.city, visits: found ? found.visits : 0 };
            });
            leagueStadiums.sort((a,b) => b.visits - a.visits || a.name.localeCompare(b.name));

            d.leagueData[lg] = { teams, stadiums: leagueStadiums };
        });

        // Country → leagues
        d.countryToLeagues = {};
        Object.entries(LEAGUE_TO_COUNTRY).forEach(([lg, ctry]) => {
            if (d.leagueData[lg]) {
                if (!d.countryToLeagues[ctry]) d.countryToLeagues[ctry] = [];
                d.countryToLeagues[ctry].push(lg);
            }
        });

        // Active league order
        d.activeLeagueOrder = LEAGUE_ORDER.filter(lg => d.leagueData[lg] && d.leagueData[lg].teams.some(([_,v]) => v > 0));

        computedData = d;
    }

    // === RENDER FUNCTIONS ===
    function renderAll() {
        const d = computedData;
        document.getElementById('navStats').textContent = d.statMatches + ' Spiele · ' + stadiums.length + ' Stadien · ' + d.statCountries + ' Länder';
        document.getElementById('footer').textContent = 'Daten aus Futbology exportiert · ' + d.statMatches + ' Spiele seit ' + (d.allYears[0] || '2002');
        renderBadges(d);
        renderFlags(d);
        renderTrophies(d);
        renderLeagues(d);
        renderLiveticker(d);
        renderPinnwand(d);
        renderStats(d);
        renderCountryChips(d);
        renderLeagueDropdown(d);
        switchLeague();
        loadLogos();
        loadTrophyImages();
        document.getElementById('loadingScreen').classList.add('hidden');
    }

    function renderBadges(d) {
        const bw = d.bestWin; const mg = d.mostGoalsMatch;
        const bwStr = bw ? bw.score : ''; const bwSub = bw ? bw.homeTeam+' – '+bw.awayTeam : '';
        const mgStr = mg ? d.mostGoals+' Tore' : ''; const mgSub = mg ? mg.homeTeam+' '+mg.score+' '+mg.awayTeam : '';
        document.getElementById('badgesRow').innerHTML =
            '<div class="badge clickable" onclick="openBadgeModal(\'spiele\')"><div class="badge-icon">⚽</div><div class="badge-info"><div class="badge-value">'+d.statMatches+'</div><div class="badge-label">Spiele</div></div></div>' +
            '<div class="badge clickable" onclick="openBadgeModal(\'teams\')"><div class="badge-icon">👕</div><div class="badge-info"><div class="badge-value">'+d.statTeams+'</div><div class="badge-label">Teams</div></div></div>' +
            '<div class="badge clickable" onclick="openBadgeModal(\'stadien\')"><div class="badge-icon">🏟️</div><div class="badge-info"><div class="badge-value">'+d.statStadiums+'</div><div class="badge-label">Stadien</div></div></div>' +
            '<div class="badge clickable" onclick="openBadgeModal(\'laender\')"><div class="badge-icon">🌍</div><div class="badge-info"><div class="badge-value">'+d.statCountries+'</div><div class="badge-label">Länder</div></div></div>' +
            '<div class="badge"><div class="badge-icon">🏆</div><div class="badge-info"><div class="badge-value">'+esc(bwStr)+'</div><div class="badge-label">Höchster Sieg</div><div class="badge-sub" title="'+esc(bwSub)+'">'+esc(bwSub)+'</div></div></div>' +
            '<div class="badge"><div class="badge-icon">🔥</div><div class="badge-info"><div class="badge-value">'+esc(mgStr)+'</div><div class="badge-label">Meiste Tore</div><div class="badge-sub" title="'+esc(mgSub)+'">'+esc(mgSub)+'</div></div></div>';
    }

    function renderFlags(d) {
        const visited = d.visitedCountries.sort((a,b) => (d.countryStats[b]?.visits||0) - (d.countryStats[a]?.visits||0));
        let html = '<div class="flags-row-title">Länder besucht</div><div class="flags-scroll">';
        visited.forEach(c => {
            const st = d.countryStats[c] || {};
            const flag = COUNTRY_FLAGS[c] || '🏳️';
            const pct = st.stadiums ? Math.round(st.visited / st.stadiums * 100) : 0;
            html += '<div class="flag-card" data-flag-country="'+esc(c)+'" onclick="filterByCountry(this,\''+esc(c)+'\')">' +
                '<div class="flag-emoji">'+flag+'</div><div class="flag-label">'+esc(c)+'</div>' +
                '<div class="flag-count">'+st.visited+' Stadien · '+st.visits+'x</div>' +
                '<div class="flag-progress"><div class="flag-progress-bar"><div class="flag-progress-fill" style="width:'+pct+'%"></div></div>' +
                '<div class="flag-progress-text">'+st.visited+' von '+st.stadiums+' Stadien</div></div></div>';
        });
        html += '</div>';
        document.getElementById('flagsRow').innerHTML = html;
    }

    function renderTrophies(d) {
        let html = '<div class="trophy-shelf-title">Wettbewerbe &amp; Pokale</div><div class="trophy-scroll">';
        TROPHY_DISPLAY_ORDER.forEach(name => {
            const info = d.trophyMatches[name];
            if (!info) return;
            const yearStr = info.first.slice(0,4) === info.last.slice(0,4) ? info.first.slice(0,4) : info.first.slice(0,4)+'–'+info.last.slice(0,4);
            const hasWiki = TROPHY_WIKI[name];
            html += '<div class="trophy-card" data-trophy-name="'+esc(name)+'" onclick="filterByTrophy(this,\''+name.replace(/'/g,"\\'")+'\')">' +
                '<div class="trophy-img-wrap">';
            if (hasWiki) html += '<img data-trophy="'+esc(name)+'" alt="'+esc(name)+'" style="display:none;">';
            html += '<div class="trophy-fallback" data-trophy-fb="'+esc(name)+'">🏆</div></div>' +
                '<div class="trophy-name" title="'+esc(name)+'">'+esc(name)+'</div>' +
                '<div class="trophy-count">'+info.count+'x</div><div class="trophy-years">'+yearStr+'</div></div>';
        });
        html += '</div>';
        document.getElementById('trophyShelf').innerHTML = html;
    }

    function renderLeagues(d) {
        let html = '';
        d.activeLeagueOrder.forEach(lg => {
            const ld = d.leagueData[lg]; if (!ld) return;
            const visited = ld.teams.filter(([_,v]) => v > 0).length;
            html += '<div class="league-section" data-league="'+esc(lg)+'">';
            html += '<div class="league-header"><div class="league-title">'+esc(lg)+'</div><div class="league-badge">'+visited+' besucht</div></div>';
            // Teams table
            html += '<div class="table-wrapper"><table><thead><tr><th>#</th><th></th><th>Team</th><th>Spiele</th><th>Erstbesuch</th></tr></thead><tbody>';
            let rank = 0;
            ld.teams.forEach(([team, visits]) => {
                const isVisited = visits > 0;
                rank++;
                const cls = isVisited ? '' : ' class="unvisited"';
                const rankCls = isVisited && rank <= 3 ? ' top3' : '';
                const initials = getInitials(team);
                const color = getColor(team);
                const hasWiki = TEAM_WIKI[team];
                const firstDate = d.teamFirstDate[team] ? formatDate(d.teamFirstDate[team]) : '';
                html += '<tr'+cls+'><td class="rank-cell'+rankCls+'">'+(isVisited ? rank : '-')+'</td>';
                html += '<td class="logo-cell">';
                if (hasWiki) html += '<img data-team="'+esc(team)+'" alt="" style="display:none;"><div data-fallback="'+esc(team)+'" class="initials-badge" style="background:'+color+'">'+initials+'</div>';
                else html += '<div class="initials-badge" style="background:'+color+'">'+initials+'</div>';
                html += '</td><td class="team-name-cell">'+esc(team)+'</td>';
                html += '<td class="matches-cell'+(isVisited?' has-visits':'')+'">'+visits+'</td>';
                html += '<td class="date-cell">'+firstDate+'</td></tr>';
            });
            html += '</tbody></table></div>';
            // Stadiums table
            if (ld.stadiums.length) {
                html += '<div class="section-subtitle">Stadien</div>';
                html += '<div class="table-wrapper"><table><thead><tr><th></th><th>Stadion</th><th>Stadt</th><th>Besuche</th><th>Erstbesuch</th></tr></thead><tbody>';
                ld.stadiums.forEach(s => {
                    const isVisited = s.visits > 0;
                    const cls = isVisited ? '' : ' class="unvisited"';
                    const firstDate = d.stadiumFirstDate[s.name] ? formatDate(d.stadiumFirstDate[s.name]) : '';
                    html += '<tr'+cls+'><td class="stadium-icon">'+(isVisited?'🏟️':'🔒')+'</td>';
                    html += '<td>'+esc(s.name)+'</td><td class="stadium-city-cell">'+esc(s.city)+'</td>';
                    html += '<td class="matches-cell'+(isVisited?' has-visits':'')+'">'+s.visits+'</td>';
                    html += '<td class="date-cell">'+firstDate+'</td></tr>';
                });
                html += '</tbody></table></div>';
            }
            html += '</div>';
        });
        document.getElementById('leagueSections').innerHTML = html;
    }

    function renderLiveticker(d) {
        let html = '';
        matches.forEach((m, idx) => {
            const date = formatDate(m.date);
            const country = d.stadiumCountry[m.stadium] || '';
            const trophy = getTrophyGroup(m.competition) || '';
            const city = d.stadiumCity[m.stadium] || '';
            const hidden = idx >= 20 ? ' ticker-hidden' : '';
            html += '<div class="ticker-item'+hidden+'" data-country="'+esc(country)+'" data-comp-group="'+esc(trophy)+'" data-idx="'+idx+'">' +
                '<div class="ticker-date">'+date+'</div>' +
                '<div class="ticker-teams">'+esc(m.homeTeam)+' – '+esc(m.awayTeam)+'</div>' +
                '<div class="ticker-score">'+esc(m.score)+'</div>' +
                '<div class="ticker-comp">'+esc(m.competition)+'</div>' +
                '<div class="ticker-stadium">🏟️ '+esc(m.stadium)+'</div>' +
                (city ? '<div class="ticker-city">📍 '+esc(city)+'</div>' : '') +
                '</div>';
        });
        document.getElementById('tickerList').innerHTML = html;
    }

    function renderPinnwand(d) {
        const teams = Object.entries(d.teamVisits).sort((a,b) => b[1] - a[1]);
        let html = '<div class="pinnwand"><div class="pinnwand-header"><div class="pinnwand-number">'+teams.length+'</div>' +
            '<div class="pinnwand-label">Teams besucht</div></div><div class="pinnwand-patches">';
        teams.forEach(([team, visits]) => {
            const initials = getInitials(team);
            const color = getColor(team);
            const hasWiki = TEAM_WIKI[team];
            html += '<div class="patch"><div class="patch-tooltip">'+esc(team)+' · '+visits+'x</div><span class="patch-count">'+visits+'</span>';
            if (hasWiki) html += '<img data-team="'+esc(team)+'" alt="'+esc(team)+'" style="display:none;"><div class="patch-initials" data-fallback="'+esc(team)+'" style="background:'+color+'">'+initials+'</div>';
            else html += '<div class="patch-initials" style="background:'+color+'">'+initials+'</div>';
            html += '</div>';
        });
        html += '</div></div>';
        document.getElementById('pinnwandContent').innerHTML = html;
    }

    function renderStats(d) {
        const hwPct = d.scoredMatches ? Math.round(d.homeWins/d.scoredMatches*100) : 0;
        const awPct = d.scoredMatches ? Math.round(d.awayWins/d.scoredMatches*100) : 0;
        const drPct = d.scoredMatches ? Math.round(d.draws/d.scoredMatches*100) : 0;
        const maxY = Math.max(...Object.values(d.yearCounts), 1);

        let html = '<div class="stats-section">';
        html += '<div class="stat-card"><div class="stat-card-title">Ergebnisse aller Spiele</div>' +
            '<div class="stat-bar-row"><span class="stat-bar-label">Heimsieg</span><div class="stat-bar"><div class="stat-bar-fill" style="width:'+hwPct+'%;background:#4ecdc4;"></div></div><span class="stat-bar-value">'+d.homeWins+'</span></div>' +
            '<div class="stat-bar-row"><span class="stat-bar-label">Auswärtssieg</span><div class="stat-bar"><div class="stat-bar-fill" style="width:'+awPct+'%;background:#e30613;"></div></div><span class="stat-bar-value">'+d.awayWins+'</span></div>' +
            '<div class="stat-bar-row"><span class="stat-bar-label">Unentschieden</span><div class="stat-bar"><div class="stat-bar-fill" style="width:'+drPct+'%;background:#c9a84c;"></div></div><span class="stat-bar-value">'+d.draws+'</span></div></div>';
        html += '<div class="stat-card"><div class="stat-card-title">Tore</div><div style="text-align:center;padding:1rem 0;">' +
            '<div style="font-size:2.5rem;font-weight:900;color:#e30613;">'+d.totalGoals+'</div>' +
            '<div style="font-size:.8rem;color:#8b8fa3;">Tore in '+d.scoredMatches+' Spielen</div>' +
            '<div style="font-size:1.5rem;font-weight:700;color:#4ecdc4;margin-top:.5rem;">⌀ '+d.goalsPerMatch+'</div>' +
            '<div style="font-size:.7rem;color:#8b8fa3;">Tore pro Spiel</div></div></div></div>';

        // Timeline
        html += '<div class="timeline-section"><div class="timeline-title">Spiele pro Jahr</div><div class="timeline-chart">';
        d.allYears.forEach(y => {
            const cnt = d.yearCounts[y];
            const barH = Math.max(8, Math.round(cnt / maxY * 100));
            html += '<div class="timeline-bar-wrap"><div class="timeline-bar-count">'+cnt+'</div>' +
                '<div class="timeline-bar" style="height:'+barH+'px;" title="'+y+': '+cnt+' Spiele"></div>' +
                '<div class="timeline-bar-year">'+y+'</div></div>';
        });
        html += '</div></div>';

        // Milestones
        html += '<div class="milestones-section"><div class="milestones-title">Rekorde &amp; Meilensteine</div><div class="milestones-grid">';
        d.milestones.forEach(([label, date, result, stadium, icon]) => {
            html += '<div class="milestone-card"><div class="milestone-icon">'+icon+'</div><div class="milestone-info">' +
                '<div class="milestone-label">'+esc(label)+'</div><div class="milestone-value">'+esc(result)+'</div>' +
                '<div class="milestone-detail">'+date+' · '+esc(stadium)+'</div></div></div>';
        });
        html += '</div></div>';
        document.getElementById('statsContent').innerHTML = html;
    }

    function renderCountryChips(d) {
        const countries = Object.keys(d.countryToLeagues).sort((a,b) => {
            if (a === 'International') return 1; if (b === 'International') return -1;
            return (d.countryStats[b]?.visits||0) - (d.countryStats[a]?.visits||0);
        });
        let html = '<button class="country-chip active" data-country="all" onclick="filterCountry(\'all\')">Alle</button>';
        countries.forEach(c => {
            const flag = COUNTRY_FLAGS[c] || '🏳️';
            html += '<button class="country-chip" data-country="'+esc(c)+'" onclick="filterCountry(\''+esc(c)+'\')">'+flag+' '+esc(c)+'</button>';
        });
        document.getElementById('countryFilterGroup').innerHTML = html;
    }

    function renderLeagueDropdown(d) {
        const sel = document.getElementById('leagueFilter');
        sel.innerHTML = '';
        d.activeLeagueOrder.forEach(lg => {
            const visited = d.leagueData[lg].teams.filter(([_,v]) => v > 0).length;
            const opt = document.createElement('option');
            opt.value = lg; opt.textContent = lg + ' (' + visited + ' besucht)';
            sel.appendChild(opt);
        });
    }

    // === INTERACTION ===
    function switchView(view) {
        document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.view-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.view-tab').forEach(t => { if (t.getAttribute('onclick') && t.getAttribute('onclick').indexOf(view) !== -1) t.classList.add('active'); });
        document.getElementById('view-' + view).classList.add('active');
        const isLigen = view === 'ligen';
        document.getElementById('leagueFilterGroup').style.display = isLigen ? '' : 'none';
        document.getElementById('countryFilterGroup').style.display = isLigen ? '' : 'none';
        if (view === 'karte' && !mapInitialized) { initMap(); mapInitialized = true; }
    }

    function switchLeague() {
        const league = document.getElementById('leagueFilter').value;
        document.querySelectorAll('.league-section').forEach(el => {
            el.classList.toggle('active', el.dataset.league === league);
        });
    }

    function filterCountry(country) {
        document.querySelectorAll('.country-chip').forEach(c => c.classList.remove('active'));
        document.querySelector('.country-chip[data-country="' + CSS.escape(country) + '"]').classList.add('active');
        activeCountry = null; activeTrophy = null;
        document.querySelectorAll('.flag-card').forEach(f => f.classList.remove('active'));
        document.querySelectorAll('.trophy-card').forEach(t => t.classList.remove('active'));
        const sel = document.getElementById('leagueFilter');
        const leagues = country === 'all' ? computedData.activeLeagueOrder : (computedData.countryToLeagues[country] || []);
        let firstVisible = null;
        for (let i = 0; i < sel.options.length; i++) {
            const show = leagues.includes(sel.options[i].value);
            sel.options[i].style.display = show ? '' : 'none';
            sel.options[i].disabled = !show;
            if (show && !firstVisible) firstVisible = sel.options[i].value;
        }
        if (firstVisible) sel.value = firstVisible;
        switchLeague(); filterTicker();
    }

    function filterByCountry(el, country) {
        const wasActive = el.classList.contains('active');
        document.querySelectorAll('.flag-card').forEach(f => f.classList.remove('active'));
        document.querySelectorAll('.trophy-card').forEach(t => t.classList.remove('active'));
        activeTrophy = null;
        if (wasActive) { activeCountry = null; filterCountry('all'); return; }
        el.classList.add('active'); activeCountry = country;
        document.querySelectorAll('.country-chip').forEach(c => c.classList.remove('active'));
        const chip = document.querySelector('.country-chip[data-country="' + CSS.escape(country) + '"]');
        if (chip) chip.classList.add('active');
        else document.querySelector('.country-chip[data-country="all"]').classList.add('active');
        const sel = document.getElementById('leagueFilter');
        const leagues = computedData.countryToLeagues[country] || computedData.activeLeagueOrder;
        let firstVisible = null;
        for (let i = 0; i < sel.options.length; i++) {
            const show = leagues.includes(sel.options[i].value);
            sel.options[i].style.display = show ? '' : 'none';
            sel.options[i].disabled = !show;
            if (show && !firstVisible) firstVisible = sel.options[i].value;
        }
        if (firstVisible) sel.value = firstVisible;
        switchLeague(); filterTicker();
    }

    function filterByTrophy(el, trophyName) {
        const wasActive = el.classList.contains('active');
        document.querySelectorAll('.trophy-card').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.flag-card').forEach(f => f.classList.remove('active'));
        activeCountry = null;
        document.querySelectorAll('.country-chip').forEach(c => c.classList.remove('active'));
        document.querySelector('.country-chip[data-country="all"]').classList.add('active');
        const sel = document.getElementById('leagueFilter');
        for (let i = 0; i < sel.options.length; i++) { sel.options[i].style.display = ''; sel.options[i].disabled = false; }
        if (wasActive) { activeTrophy = null; filterTicker(); return; }
        el.classList.add('active'); activeTrophy = trophyName; filterTicker();
    }

    function filterTicker() {
        const isFiltered = activeTrophy || activeCountry;
        let matchCount = 0;
        document.querySelectorAll('.ticker-item').forEach(item => {
            const idx = parseInt(item.dataset.idx);
            if (isFiltered) {
                let show = true;
                if (activeTrophy) show = item.dataset.compGroup === activeTrophy;
                else if (activeCountry) show = item.dataset.country === activeCountry;
                item.style.display = show ? '' : 'none';
                item.classList.remove('ticker-hidden');
                if (show) matchCount++;
            } else {
                item.style.display = '';
                if (idx >= 20) item.classList.add('ticker-hidden');
                else item.classList.remove('ticker-hidden');
            }
        });
        const t = document.getElementById('tickerTitle');
        if (activeTrophy) t.innerHTML = '<span class="pulse"></span> ' + activeTrophy + ' (' + matchCount + ' Spiele)';
        else if (activeCountry) t.innerHTML = '<span class="pulse"></span> Spiele in ' + activeCountry + ' (' + matchCount + ')';
        else t.innerHTML = '<span class="pulse"></span> Letzte Spiele';
    }

    function openBadgeModal(type) {
        const overlay = document.getElementById('badgeModal');
        const title = document.getElementById('badgeModalTitle');
        const list = document.getElementById('badgeModalList');
        list.innerHTML = '';
        const d = computedData;
        if (type === 'spiele') { title.innerHTML = '⚽ Alle Spiele'; list.innerHTML = '<li style="text-align:center;padding:1rem;color:#8b8fa3">Klicke auf einen Pokal oder eine Flagge für Spieldetails</li>'; }
        if (type === 'teams') {
            const teams = Object.entries(d.teamVisits).sort((a,b) => b[1]-a[1]);
            title.innerHTML = '👕 Alle Teams ('+teams.length+')';
            teams.forEach(([t,v]) => { list.innerHTML += '<li><span class="bm-name">'+esc(t)+'</span><span class="bm-value">'+v+'x</span></li>'; });
        }
        if (type === 'stadien') {
            const st = stadiums.filter(s => s.visits > 0).sort((a,b) => b.visits-a.visits);
            title.innerHTML = '🏟️ Alle Stadien ('+st.length+')';
            st.forEach(s => { list.innerHTML += '<li><span class="bm-name">'+esc(s.name)+' <small style="color:#8b8fa3">('+esc(s.country)+')</small></span><span class="bm-value">'+s.visits+'x</span></li>'; });
        }
        if (type === 'laender') {
            const countries = d.visitedCountries.sort((a,b) => (d.countryStats[b]?.visits||0)-(d.countryStats[a]?.visits||0));
            title.innerHTML = '🌍 Alle Länder ('+countries.length+')';
            countries.forEach(c => { const st = d.countryStats[c]||{}; list.innerHTML += '<li><span class="bm-name">'+esc(c)+' <small style="color:#8b8fa3">'+st.visited+' Stadien</small></span><span class="bm-value">'+st.visits+'x</span></li>'; });
        }
        overlay.classList.add('active');
    }
    function closeBadgeModal() { document.getElementById('badgeModal').classList.remove('active'); }

    // === MAP ===
    function initMap() {
        const map = L.map('stadiumMap').setView([51.0, 7.0], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap', maxZoom: 18 }).addTo(map);
        const colors = {'Deutschland':'#e30613','Niederlande':'#ff6b00','Belgien':'#fbbf24','Portugal':'#00843d'};
        stadiums.forEach(s => {
            if (!s.visits || !s.lat || !s.lng) return;
            // Also check STADIUM_COORDS for coordinates
            let lat = s.lat, lng = s.lng;
            if ((!lat || !lng) && STADIUM_COORDS[s.name]) { lat = STADIUM_COORDS[s.name][0]; lng = STADIUM_COORDS[s.name][1]; }
            if (!lat || !lng) return;
            const color = colors[s.country] || '#4ecdc4';
            const radius = Math.max(6, Math.min(14, 4 + s.visits * 1.5));
            L.circleMarker([lat, lng], { radius, fillColor: color, color: '#fff', weight: 2, opacity: 1, fillOpacity: 0.85 })
                .addTo(map).bindPopup('<strong>'+s.name+'</strong><br>'+s.country+'<br><span style="color:'+color+';font-weight:700;">'+s.visits+' Besuche</span>');
        });
        setTimeout(() => map.invalidateSize(), 200);
    }

    // === LOGO LOADING ===
    async function loadLogo(teamName) {
        const articles = TEAM_WIKI[teamName]; if (!articles) return;
        for (const [lang, art] of [['en', articles[0]], ['de', articles[1]]]) {
            try {
                const r = await fetch('https://'+lang+'.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(art));
                if (r.ok) { const d = await r.json(); if (d.thumbnail?.source) { setLogo(teamName, d.thumbnail.source); return; } }
            } catch(e) {}
        }
    }
    function setLogo(teamName, url) {
        document.querySelectorAll('img[data-team="' + CSS.escape(teamName) + '"]').forEach(img => {
            img.src = url; img.style.display = '';
            const fb = img.nextElementSibling;
            if (fb && fb.dataset.fallback === teamName) fb.style.display = 'none';
        });
    }
    async function loadLogos() {
        const teams = Object.keys(TEAM_WIKI);
        for (let i = 0; i < teams.length; i++) {
            loadLogo(teams[i]);
            if (i % 8 === 7) await new Promise(r => setTimeout(r, 150));
        }
    }

    async function loadTrophyImg(name) {
        const articles = TROPHY_WIKI[name]; if (!articles) return;
        for (const [lang, art] of [['en', articles[0]], ['de', articles[1]]]) {
            try {
                const r = await fetch('https://'+lang+'.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(art));
                if (r.ok) { const d = await r.json(); if (d.thumbnail?.source) { setTrophyImg(name, d.thumbnail.source); return; } }
            } catch(e) {}
        }
    }
    function setTrophyImg(name, url) {
        document.querySelectorAll('img[data-trophy="' + CSS.escape(name) + '"]').forEach(img => {
            img.src = url; img.style.display = '';
            const fb = img.nextElementSibling;
            if (fb && fb.dataset.trophyFb === name) fb.style.display = 'none';
        });
    }
    async function loadTrophyImages() {
        const trophies = Object.keys(TROPHY_WIKI);
        for (let i = 0; i < trophies.length; i++) {
            loadTrophyImg(trophies[i]);
            if (i % 4 === 3) await new Promise(r => setTimeout(r, 200));
        }
    }

    // === BUILD STADIUMS FROM MATCHES ===
    function buildStadiumsFromMatches() {
        // Count visits per stadium from match data
        const visitCounts = {};
        matches.forEach(m => {
            visitCounts[m.stadium] = (visitCounts[m.stadium] || 0) + 1;
        });
        // Build stadium objects from embedded data
        stadiums = Object.keys(visitCounts).map(name => {
            const coords = STADIUM_COORDS[name] || [0, 0];
            const country = STADIUM_COUNTRY[name] || 'Deutschland';
            // Find city from TEAM_STADIUMS
            let city = '';
            for (const [team, [sname, scity]] of Object.entries(TEAM_STADIUMS)) {
                if (sname === name) { city = scity; break; }
            }
            return { name, city, visits: visitCounts[name], lat: coords[0], lng: coords[1], country };
        });
    }

    // === LOAD DATA FROM CSV TEXT ===
    function loadFromCSVText(text) {
        matches = parseCSV(text);
        matches = matches.filter(m => m.date);
        matches.sort((a,b) => (b.date||'').localeCompare(a.date||''));
        buildStadiumsFromMatches();
        processData();
        renderAll();
    }

    // === FILE PICKER FALLBACK ===
    function showFilePicker() {
        const ls = document.getElementById('loadingScreen');
        ls.innerHTML = `
            <div style="text-align:center;max-width:500px;">
                <div style="font-size:2rem;margin-bottom:12px;">⚽</div>
                <div style="font-size:1.2rem;color:#e0e0e0;margin-bottom:6px;">Futbology Dashboard</div>
                <div style="font-size:.85rem;color:#888;margin-bottom:24px;">Lokaler Modus — wähle deine spiele.csv aus</div>
                <div class="file-drop-zone" id="dropZone">
                    <input type="file" id="csvFileInput" accept=".csv">
                    <div class="file-drop-title">📂 spiele.csv hierher ziehen</div>
                    <div class="file-drop-sub">oder klicken zum Auswählen</div>
                </div>
                <div style="font-size:.75rem;color:#555;margin-top:16px;">
                    Tipp: Auf GitHub Pages lädt die Seite die CSV automatisch.
                </div>
            </div>`;
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('csvFileInput');
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault(); dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) readCSVFile(file);
        });
        fileInput.addEventListener('change', e => { if (e.target.files[0]) readCSVFile(e.target.files[0]); });
    }

    function readCSVFile(file) {
        const reader = new FileReader();
        reader.onload = e => {
            try {
                loadFromCSVText(e.target.result);
            } catch(err) {
                alert('Fehler beim Lesen der CSV: ' + err.message);
            }
        };
        reader.readAsText(file, 'UTF-8');
    }

    // === INIT: TRY FETCH (GitHub Pages), FALLBACK TO EMBEDDED DATA (lokal) ===
    async function init() {
        let csvText = EMBEDDED_CSV; // Default: eingebettete Daten
        try {
            if (window.location.protocol.startsWith('http')) {
                const resp = await fetch('spiele.csv');
                if (resp.ok) {
                    const fetched = await resp.text();
                    // Use if it contains date patterns (works for both ; and : formats)
                    if (/\d{8}[;:]/.test(fetched)) {
                        csvText = fetched;
                    }
                }
            }
        } catch(e) { /* fetch failed, use embedded data */ }

        try {
            loadFromCSVText(csvText);
        } catch(err) {
            document.getElementById('loadingScreen').innerHTML =
                '<div class="error-msg" style="color:#e30613;text-align:center;padding:40px;">Fehler: ' + err.message + '</div>';
        }
    }
    init();
    </script>
